services:
  pipeline:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file: ../.env
    volumes:
      - ../data:/app/data
      - ../config:/app/config
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
