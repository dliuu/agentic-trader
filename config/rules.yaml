# Unusual Whales API
api:
  base_url: "https://api.unusualwhales.com"
  client_id: "100001"
  # API token loaded from .env, not stored here

# Shared UW client behavior (scanner + grader). Token: UW_API_TOKEN or UNUSUAL_WHALES_API_TOKEN.
unusual_whales:
  rate_limit:
    calls_per_minute: 45
    burst: 10
  iv_vol_cache_ttl_seconds: 90
  sector_cache_refresh_seconds: 28800   # 8h — do not refresh benchmark basket every candidate
  sector_fetch_concurrency: 2           # cap parallel benchmark ticker fetches
  poll_backoff_max_multiplier: 4.0      # scanner widens interval when hitting 429s

# Polling cadence
polling:
  flow_alerts_interval_seconds: 30
  dark_pool_interval_seconds: 120
  market_tide_interval_seconds: 120
  market_open: "09:30"       # ET
  market_close: "16:00"      # ET
  pre_market_start: "09:15"  # Start polling slightly early
  timezone: "US/Eastern"

# Filter thresholds — Agent A's rule definitions
filters:
  # Out-of-the-money filter
  otm:
    enabled: true
    min_otm_percentage: 5     # Strike at least 5% from spot
    max_otm_percentage: 50    # Ignore >50% OTM (likely data errors)

  # Premium size
  premium:
    enabled: true
    min_premium_usd: 25000    # At least $25k total premium
    min_premium_vs_avg_ratio: 3.0  # 3x the 20-day avg premium

  # Volume and open interest
  volume:
    enabled: true
    size_greater_oi: true     # Trade size exceeds open interest
    min_volume_oi_ratio: 2.0  # Volume at least 2x OI
    max_avg_daily_volume: 500 # Flag low-volume tickers (contracts/day)

  # Time to expiration
  expiry:
    enabled: true
    max_dte: 14               # Near-term bets only (days to expiry)
    min_dte: 1                # Skip 0DTE noise

  # Execution type
  execution:
    enabled: true
    require_sweep_or_block: true  # Sweep = urgency, block = size

  # Dark pool confluence
  dark_pool:
    enabled: true
    min_notional_usd: 500000  # Dark pool print size threshold
    lookback_minutes: 30      # Match with options flow within window

  # Market regime filter
  market_regime:
    enabled: true
    respect_tide_direction: true
    tide_threshold_ratio: 1.5

# Confluence scoring — how many signals needed
confluence:
  min_signals_required: 2     # Must match at least 2 rules
  weights:
    otm: 1.0
    premium: 1.5
    volume: 1.0
    expiry: 0.5
    execution: 1.0
    dark_pool: 2.0
    market_regime: 0.5

# Deduplication
dedup:
  ttl_minutes: 60             # Forget seen trades after 1 hour
  key_fields:
    - ticker
    - strike
    - expiry
    - direction

# Output
output:
  queue_max_size: 100
  sqlite_db_path: "data/scanner.db"
  slack_webhook_url: null     # Set in .env if desired

# Grader (Agent B) — LLM-powered trade grading
grader:
  score_threshold: 70
  model: "claude-sonnet-4-20250514"
  max_tokens: 512
  timeout_seconds: 15
  max_parse_retries: 1
  enabled: true               # Toggle to disable grading (pass-through mode)

# Signal Tracker — monitors candidates that pass all grading gates
tracker:
  enabled: true

  # Polling cadence
  poll_interval_market_seconds: 300      # 5 min during market hours
  poll_interval_off_hours_seconds: 1800  # 30 min pre/post market
  morning_reconciliation: true           # extra poll at market open for overnight changes

  # Monitoring window — how long to track a signal before giving up
  monitoring_window_days: 7              # max calendar days to watch a pending/accumulating signal
  min_dte_for_monitoring: 3             # stop monitoring if option DTE drops below this

  # Capacity limits
  max_active_signals: 10                # pause new signal creation if this many are active
  max_snapshots_per_signal: 500         # cap storage per signal (5min × 6.5hrs × 7days ≈ 546)

  # Conviction thresholds — when does a signal become actionable?
  actionable_conviction: 90.0           # conviction score must reach this
  actionable_min_confirming_flows: 2    # must see at least N new flow events
  actionable_min_oi_ratio: 1.5          # current OI / initial OI must exceed this

  # Decay thresholds — when does a signal die?
  decay_conviction: 60.0                # signal decays if conviction drops below this
  decay_window_conviction: 80.0         # must reach this within monitoring_window_days or decays
  silence_decay_days: 2                 # days of no new flow before silence penalty kicks in

  # Neighbor analysis
  neighbor_strike_radius: 5             # check ±N strikes from signal's strike
  neighbor_expiry_radius: 1             # check ±N expiries from signal's expiry

  # News watcher — UW headlines + SEC EDGAR EFTS on per-signal cadence (see README)
  news:
    enabled: true
    headline_interval_seconds: 14400    # 4 hours — aligned with EDGAR cadence below
    edgar_interval_seconds: 14400       # 4 hours
    edgar_lookback_days: 7
    edgar_user_agent: "agentic-trader/1.0 your-email@example.com"

  # Flow ledger — watched-ticker scanner bypass + conviction / flow_watcher context
  ledger:
    enabled: true
    purge_terminal_signals: true      # delete ledger rows when signal reaches a terminal state
    retention_days: 30                # periodically purge entries older than this (all signals)

  # Conviction scoring deltas (per poll cycle)
  scoring:
    oi_increase_per_10pct: 2            # +N per 10% OI increase
    oi_increase_cap: 8                  # max bonus from OI increase per cycle
    confirming_flow_bonus: 5            # +N per new flow event on same ticker
    confirming_flow_cap: 15             # max bonus from new flow per cycle
    ghost_strike_bonus: 3               # +N per new active strike on same expiry
    put_call_shift_bonus: 3             # +N if put/call ratio shifts toward signal direction
    premium_accumulation_bonus: 2       # +N if cumulative premium > 2x initial

    oi_decrease_per_10pct: -3           # penalty per 10% OI decrease
    spread_widened_penalty: -5          # penalty if bid-ask > 20%
    silence_penalty_per_day: -4         # penalty per day of no new flow (after silence_decay_days)
    spot_moved_away_per_5pct: -2        # penalty per 5% spot moves away from strike
    dte_pressure_below_14: -3           # penalty per day when DTE < 14

# Re-grader — milestone LLM refresh (Gate 3 sentiment / insider / sector + synthesis blend)
enrichment:
  regrader:
    enabled: true
    max_regrades_per_signal: 5
    min_interval_seconds: 7200
    score_blend_deterministic_pct: 55.0
    score_blend_llm_pct: 45.0
    premium_multiple_trigger: 2.0
    oi_multiple_trigger: 3.0
    confirming_flows_trigger: 3
    model: "claude-sonnet-4-20250514"
    max_tokens: 512
    timeout_seconds: 15.0
